services:
  - type: web
    name: meetnow-server
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install --production
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LIVEKIT_HOST
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
